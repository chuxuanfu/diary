<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>本地日记</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="traffic-space"></div>
        <div class="brand">
          <h1>本地日记</h1>
          <p id="dataDirLabel">载入中</p>
        </div>

        <button class="primary wide" id="newDiaryButton">新建日记</button>
        <div class="date-list" id="dateList"></div>

        <div class="sidebar-actions">
          <button class="ghost wide" id="openFolderButton">打开保存文件夹</button>
          <button class="ghost wide" id="settingsButton">设置</button>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div class="date-control">
            <label class="subtle" for="dateInput">日期</label>
            <input id="dateInput" class="date-input" type="date" />
          </div>
          <div class="top-actions">
            <button id="processButton" class="secondary">处理原料</button>
            <button id="saveDraftButton" class="secondary">保存草稿</button>
            <button id="saveDiaryButton" class="primary">保存日记</button>
          </div>
        </header>

        <section class="work-grid" id="workGrid">
          <div class="compose-left" id="composeLeft">
            <section class="section material-section">
              <div class="section-head">
                <div>
                  <h2>原材料文件</h2>
                  <p>音频、文本、图片先放在这里。</p>
                </div>
                <div class="button-row">
                  <button class="icon-button" id="addAudioButton">音频</button>
                  <button class="icon-button" id="addTextButton">文本</button>
                  <button class="icon-button" id="addImageButton">图片</button>
                </div>
              </div>
              <div class="materials" id="materials"></div>
            </section>

            <section class="section log-section">
              <div class="section-head compact">
                <div>
                  <h2>处理记录</h2>
                  <p>转写、图片理解、本地 AI 调用状态。</p>
                </div>
              </div>
              <div class="log" id="log"></div>
            </section>
          </div>

          <section class="section diary-section">
            <div class="section-head">
              <div>
                <h2 id="diaryTitle">日记展示区</h2>
                <p id="diaryPathLabel">新建日记后会在这里生成草稿。</p>
              </div>
              <button class="ghost" id="revealDiaryButton" disabled>定位文件</button>
            </div>
            <div
              id="diaryEditor"
              class="diary-editor"
              contenteditable="true"
              data-placeholder="处理原料后，生成的日记会出现在这里。你也可以直接修改。"
            ></div>
          </section>
        </section>
      </main>
    </div>

    <div class="modal hidden" id="audioChoiceModal" aria-hidden="true">
      <div class="modal-sheet small-sheet">
        <div class="sheet-head">
          <div>
            <h2>添加音频</h2>
            <p>选择现场录音，或上传已有音频文件。</p>
          </div>
          <button class="ghost" id="closeAudioChoiceButton">关闭</button>
        </div>
        <div class="choice-grid">
          <button class="choice-button" id="recordAudioButton">现场录音</button>
          <button class="choice-button" id="uploadAudioButton">上传音频文件</button>
        </div>
      </div>
    </div>

    <div class="modal hidden" id="recordModal" aria-hidden="true">
      <div class="modal-sheet small-sheet">
        <div class="sheet-head">
          <div>
            <h2>现场录音</h2>
            <p id="recordStatus">准备开始。</p>
          </div>
          <button class="ghost" id="closeRecordButton">关闭</button>
        </div>
        <div class="record-actions">
          <button class="primary" id="startRecordButton">开始录音</button>
          <button class="secondary" id="stopRecordButton" disabled>停止并保存</button>
        </div>
      </div>
    </div>

    <div class="modal hidden" id="textModal" aria-hidden="true">
      <div class="modal-sheet">
        <div class="sheet-head">
          <div>
            <h2>添加文本</h2>
            <p>保存后会作为一个文本文件进入原材料区域。</p>
          </div>
          <button class="ghost" id="closeTextButton">关闭</button>
        </div>
        <div class="form-grid single">
          <label>
            <span>标题</span>
            <input id="textTitleInput" placeholder="例如：下午随手记" />
          </label>
          <label>
            <span>内容</span>
            <textarea id="textContentInput" class="text-material-input" placeholder="直接写下今天发生的事、想法、片段。"></textarea>
          </label>
        </div>
        <div class="sheet-actions">
          <button id="saveTextMaterialButton" class="primary">保存文本</button>
        </div>
      </div>
    </div>

    <div class="modal hidden" id="previewModal" aria-hidden="true">
      <div class="modal-sheet preview-sheet">
        <div class="sheet-head">
          <div>
            <h2 id="previewTitle">预览</h2>
            <p id="previewSubtitle"></p>
          </div>
          <button class="ghost" id="closePreviewButton">关闭</button>
        </div>
        <div class="preview-body" id="previewBody"></div>
      </div>
    </div>

    <div class="settings-panel hidden" id="settingsPanel" aria-hidden="true">
      <div class="settings-sheet">
        <div class="sheet-head">
          <div>
            <h2>设置</h2>
            <p>全部处理都在本机完成。</p>
          </div>
          <button class="ghost" id="closeSettingsButton">关闭</button>
        </div>

        <div class="form-grid">
          <label>
            <span>保存文件夹</span>
            <div class="inline-field">
              <input id="dataDirInput" readonly />
              <button id="chooseDataDirButton" class="secondary">选择</button>
            </div>
          </label>
          <label>
            <span>AI 接口类型</span>
            <select id="aiProviderInput">
              <option value="ollama">Ollama</option>
              <option value="openai">OpenAI 兼容</option>
            </select>
          </label>
          <label>
            <span>AI API 地址</span>
            <input id="ollamaBaseUrlInput" />
          </label>
          <label>
            <span>API Key</span>
            <input id="openaiApiKeyInput" placeholder="本地服务通常可以留空" />
          </label>
          <label>
            <span>日记模型</span>
            <input id="textModelInput" />
          </label>
          <label>
            <span>图片理解模型</span>
            <input id="visionModelInput" />
          </label>
          <label>
            <span>Whisper 命令</span>
            <input id="whisperCommandInput" placeholder="auto" />
          </label>
          <label>
            <span>Whisper 模型路径</span>
            <input id="whisperModelPathInput" />
          </label>
          <label class="full">
            <span>日记风格提示词</span>
            <textarea id="stylePromptInput"></textarea>
          </label>
        </div>

        <div class="env-status" id="envStatus"></div>
        <div class="sheet-actions">
          <button id="saveSettingsButton" class="primary">保存设置</button>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
